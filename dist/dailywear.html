<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="css/main.css">
    <title>Daily Wear</title>
</head>
<body>
        <header class="shop">
        <h1>The Y Shop</h1>
        <div class="search-container">
            <input type="text" placeholder="Search..." class="Search-input">
            <button class="search-button">Search</button>
        </div>
        <div class="list">
            <a href="wishlist.html" class="wishlistbag">Wish List</a>
            <a href="mybag.html" class="wishlistbag">My Bag</a>
        </div>
        <div class="Gender">
        <a href="men.html">
        <button class="gender">Mens</button></a>
        <a href="women.html">
        <button class="gender">Womens</button></a>
        </div>
        <p modern>Modern fashion for everyone</p>
        <div class="categories">
            <button class="category">New</button>
            <button class="category">Clothes</button> 
            <button class="category">Suits</button>
            <button class="category">Shoes</button>
            <button class="category">Hats</button>
            <button class="category">Bags</button>
            <button class="category">Accessories</button>
        </div>
        <p class="dailywear">Daily Wear </p>
        <select class="sort">
            <option value="featured">Sort By: Featured</option>
            <option value="price-low">Price: Low to High</option>
            <option value="price-high">Price: High to Low</option>
            <option value="newest"> Newest</option>
        </select>
        <div class="dailywearset">
            <a href="quarterzip.html">
                <div class="image-container">
                <img src="images/quarterzip.jpg" class="oneset">
                <button class="wishlist-btn">
                    <span class="heart">♡</span>
                </button></div>
                <p class="product-name">Oversized quarterzip</p>
                <p class="product-price">45.50$</p>
            </a>
            <a href="plaitedpants.html">
            <div class="image-container">
                <img src="images/simplepant.jpg" class="oneset">
                <button class="wishlist-btn">
                    <span class="heart">♡</span>
                </button></div>
                <p class="product-name">straight fit plaited pants</p>
                <p class="product-price">35.75$</p>
                </a>
            <a href="whitet-shirt.html">
                <div class="image-container">
                <img src="images/whiteteeshirt.jpg" class="oneset">
                <button class="wishlist-btn">
                    <span class="heart">♡</span>
                </button></div>
                <p class="product-name">Cotton Short-Sleeve T-Shirt</p>
                <p class="product-price">25$</p>
            </a>
            <a href="Nikeairforce.html">
                <div class="image-container">
                <img src="images/Nikeairforce.jpg" class="oneset">
                <button class="wishlist-btn">
                    <span class="heart">♡</span>
                </button></div>
                <p class="product-name">Nike Airforce</p>
                <p class="product-price">120$</p>
            </a>
        </div>
    </header>
</body>
</html>
